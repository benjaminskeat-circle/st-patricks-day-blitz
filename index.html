<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buddy Blitz Live Leaderboard</title>
    <style>
        /* Theming inspired by Buddy Blitz art */
        :root {
            --emerald-green: #007c3f;
            --light-green: #e6f4ea;
            --gold: #d4af37;
            --dark-gray: #333333;
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: #f0f7f2; 
            padding: 20px; 
            margin: 0;
        }
        
        .container { 
            max-width: 600px; 
            margin: auto; 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 8px 16px rgba(0, 124, 63, 0.15); 
            border-top: 6px solid var(--emerald-green);
        }

        .header-section {
            text-align: center;
            margin-bottom: 25px;
        }

        h1 { 
            color: var(--emerald-green); 
            font-size: 28px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h2 { 
            text-align: center; 
            color: var(--dark-gray); 
            border-bottom: 2px solid var(--gold);
            padding-bottom: 10px;
            margin-top: 30px;
        }

        .form-group { margin-bottom: 15px; }
        .form-group label { font-weight: bold; color: var(--dark-gray); display: block; margin-bottom: 5px;}
        
        input[type="text"] { 
            width: 100%; 
            padding: 12px; 
            box-sizing: border-box; 
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: var(--emerald-green);
            box-shadow: 0 0 5px rgba(0, 124, 63, 0.3);
        }

        .checkbox-group { 
            margin-top: 15px; 
            background: var(--light-green); 
            padding: 15px; 
            border-radius: 8px; 
            border: 1px solid #cce8d6;
        }
        
        .checkbox-group label {
            font-size: 16px;
            color: var(--dark-gray);
            cursor: pointer;
            display: inline-block;
            margin-bottom: 10px;
        }

        .btn-submit { 
            width: 100%; 
            padding: 14px; 
            background: var(--emerald-green); 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-size: 18px; 
            cursor: pointer; 
            font-weight: bold; 
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.2s;
            margin-top: 15px;
        }
        
        .btn-submit:hover { 
            background: #005a2e; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .btn-clear { 
            width: 100%; 
            padding: 10px; 
            background: #fff; 
            color: #dc3545; 
            border: 1px solid #dc3545; 
            border-radius: 5px; 
            margin-top: 30px; 
            cursor: pointer; 
            font-weight: bold;
        }

        .leaderboard-item { 
            display: flex; 
            justify-content: space-between; 
            padding: 15px 10px; 
            border-bottom: 1px solid #eee; 
            align-items: center;
        }
        
        .rank-name {
            font-size: 16px;
            color: var(--dark-gray);
        }

        .prize-tier { 
            font-weight: bold; 
            color: var(--gold); 
            background: #fff9e6;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid var(--gold);
            font-size: 14px;
        }
        
        .penalty-zone { 
            font-weight: bold; 
            color: white; 
            background: #dc3545;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 14px;
        }
        
        .safe-zone {
            font-weight: normal;
            color: #666;
            font-size: 14px;
        }
        
        .small-note {
            margin-top: 15px;
            color: #666;
            font-size: 12px;
            text-align: center;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <h2 style="margin-top:0; border:none; color:#007c3f; letter-spacing:2px;">CIRCLE MSP</h2>
        <h1>🍀 Buddy Blitz Tracker 🍀</h1>
        <p style="color: #666; margin-top: 0; font-weight:bold;">Friday March 13th Live Scoreboard</p>
    </div>
    
    <div class="form-group">
        <label>Rep/Team Name:</label>
        <input type="text" id="repName" placeholder="Example: Team Alpha">
    </div>
    
    <div class="form-group">
        <label>Client Visited:</label>
        <input type="text" id="clientName" placeholder="Example: Acme Corp">
    </div>

    <div class="checkbox-group">
        <label><input type="checkbox" id="selfie" style="transform: scale(1.3); margin-right: 10px;"> 📸 Client Selfie (2 pts)</label><br>
        <label><input type="checkbox" id="sit" style="transform: scale(1.3); margin-right: 10px;"> 🪑 The "Sit" (5 pts)</label><br>
        <label><input type="checkbox" id="appt" style="transform: scale(1.3); margin-right: 10px;"> 📅 Appointment Set (10 pts)</label>
    </div>
    
    <button class="btn-submit" onclick="submitScore()">Stack Points!</button>

    <h2>🏆 Live Leaderboard</h2>
    <div id="leaderboard"></div>

    <button class="btn-clear" onclick="clearData()">🗑️ Reset Scoreboard</button>
    
    <div class="small-note">
        <strong>Prizes:</strong> 1st = $100, 2nd = $60, 3rd = $40.<br>
        <strong>Penalty:</strong> Bottom two teams do cold calls ONLY if they fall 20+ points behind 3rd place.
    </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    // HARDCODED FIREBASE CREDENTIALS
    const firebaseConfig = {
      apiKey: "AIzaSyDzB90fTwtHI9fozfVOUGAJePwjyzVou9c",
      authDomain: "st-patricks-day-2026-7874a.firebaseapp.com",
      databaseURL: "https://st-patricks-day-2026-7874a-default-rtdb.firebaseio.com",
      projectId: "st-patricks-day-2026-7874a",
      storageBucket: "st-patricks-day-2026-7874a.firebasestorage.app",
      messagingSenderId: "680943775982",
      appId: "1:680943775982:web:bbf37d70fcc792eef583ff"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function submitScore() {
        const repName = document.getElementById('repName').value.trim();
        const clientName = document.getElementById('clientName').value.trim();
        
        let points = 0;
        if (document.getElementById('selfie').checked) points += 2;
        if (document.getElementById('sit').checked) points += 5;
        if (document.getElementById('appt').checked) points += 10;

        if (!repName || !clientName) {
            alert("Please enter both the rep name and the client name!");
            return;
        }
        if (points === 0) {
            alert("You must select at least one engagement type to score points.");
            return;
        }

        // Push to Firebase Realtime Database
        db.ref('blitz_entries').push({
            rep: repName,
            client: clientName,
            points: points,
            timestamp: Date.now()
        }).then(() => {
            // Reset the form
            document.getElementById('clientName').value = '';
            document.getElementById('selfie').checked = false;
            document.getElementById('sit').checked = false;
            document.getElementById('appt').checked = false;
            
            // Success message
            alert(`Awesome! ${repName} just scored ${points} points!`);
        }).catch((error) => {
            alert("Error saving score. Please check Firebase Rules. " + error.message);
        });
    }

    // Real-time Leaderboard Listener
    db.ref('blitz_entries').on('value', (snapshot) => {
        const data = snapshot.val();
        const scores = {};
        const board = document.getElementById('leaderboard');
        board.innerHTML = '';

        if (!data) {
            board.innerHTML = '<p style="text-align:center; color:#777; margin-top:20px;">No entries yet. Go get some points!</p>';
            return;
        }

        // Aggregate scores per rep
        for (let id in data) {
            let entry = data[id];
            scores[entry.rep] = (scores[entry.rep] || 0) + entry.points;
        }

        // Sort reps from highest to lowest score
        const sortedReps = Object.keys(scores).map(rep => {
            return { name: rep, score: scores[rep] };
        }).sort((a, b) => b.score - a.score);

        // Calculate the Safety Line (20 points behind 3rd place)
        let safetyLine = 0;
        if (sortedReps.length >= 3) {
            safetyLine = sortedReps[2].score - 20;
        }

        // Render the Leaderboard
        sortedReps.forEach((rep, index) => {
            let rank = index + 1;
            let badge = '';
            let styleClass = '';

            // Assign Prizes
            if (rank === 1) { badge = '🥇 $100 Prize'; styleClass = 'prize-tier'; }
            else if (rank === 2) { badge = '🥈 $60 Prize'; styleClass = 'prize-tier'; }
            else if (rank === 3) { badge = '🥉 $40 Prize'; styleClass = 'prize-tier'; }
            
            // Assign Cold Call Penalty
            let isBottomTwo = (rank === sortedReps.length || rank === sortedReps.length - 1);
            if (sortedReps.length >= 5 && isBottomTwo) {
                if (rep.score < safetyLine) {
                    badge = '🚨 COLD CALL ZONE';
                    styleClass = 'penalty-zone';
                } else {
                    badge = '🛡️ Safe Zone';
                    styleClass = 'safe-zone';
                }
            }

            board.innerHTML += `
                <div class="leaderboard-item">
                    <span class="rank-name"><strong>${rank}. ${rep.name}</strong> - ${rep.score} pts</span>
                    <span class="${styleClass}">${badge}</span>
                </div>
            `;
        });
    });

    // Password Protected Firebase Reset
    function clearData() {
        const password = prompt("Admin access required. Please enter the password to reset the scoreboard:");
        
        if (password === "222940") {
            if(confirm("Password accepted. Are you ABSOLUTELY sure you want to delete all data from the live database? This cannot be undone.")) {
                
                // Wipe the entire database node in Firebase
                db.ref('blitz_entries').remove()
                    .then(() => alert("Scoreboard has been reset."))
                    .catch((error) => alert("Error resetting scoreboard: " + error.message));
                    
            }
        } else if (password !== null) {
            alert("Incorrect password. Scoreboard remains active.");
        }
    }
</script>
</body>
</html>
